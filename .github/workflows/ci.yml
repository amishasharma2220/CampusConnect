name: CampusConnect CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # =========================
      # 🔧 BACKEND
      # =========================
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Check backend build
        working-directory: ./backend
        run: node -e "require('./server.js')"

      # =========================
      # 🎨 FRONTEND
      # =========================
      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      # =========================
      # 🐳 DOCKER
      # =========================
      - name: Build backend Docker image
        run: docker build -t campusconnect-backend ./backend

      - name: Build frontend Docker image
        run: docker build -t campusconnect-frontend .
