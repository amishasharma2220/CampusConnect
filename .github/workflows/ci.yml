name: CampusConnect CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # Backend
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      # Frontend
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      # Docker builds
      - name: Build backend Docker image
        run: docker build -t campusconnect-backend ./backend

      - name: Build frontend Docker image
        run: docker build -t campusconnect-frontend ./frontend